<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 COEP TECH UNI STUDY RESOURCE HUB</title>
    <meta name="description" content="Collaborative study resource hub for COEP Technological University. Organize, share, and learn together!">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">

    <style>
        :root {
            --bg: #06060e;
            --bg2: #0d0d1a;
            --card: #111122cc;
            --card-border: #1e1e3a;
            --primary: #a855f7;
            --primary2: #6366f1;
            --accent: #06b6d4;
            --gold: #f59e0b;
            --text: #e2e2f0;
            --text2: #a0a0c0;
            --text3: #6b6b8a;
            --danger: #f43f5e;
            --success: #10b981;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 8px 40px #00000055;
            --glow: 0 0 30px #a855f733;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.light-mode {
            --bg: #f8fafc;
            --bg2: #e2e8f0;
            --card: #ffffffdd;
            --card-border: #cbd5e1;
            --primary: #8b5cf6;
            --primary2: #6366f1;
            --accent: #0ea5e9;
            --gold: #f59e0b;
            --text: #1e293b;
            --text2: #475569;
            --text3: #64748b;
            --danger: #ef4444;
            --success: #10b981;
            --shadow: 0 8px 30px #00000015;
            --glow: 0 0 20px #8b5cf633;
            background: var(--bg);
            color: var(--text);
        }
        body.light-mode .toolbar {
            background: #ffffffcc;
            border-color: #cbd5e1;
        }
        body.light-mode .search-wrap input {
            background: #f1f5f9;
            border-color: #cbd5e1;
            color: #1e293b;
        }
        body.light-mode .modal {
            background: #ffffff;
            border-color: #cbd5e1;
        }
        body.light-mode .modal input,
        body.light-mode .modal select,
        body.light-mode .modal textarea {
            background: #f8fafc;
            border-color: #cbd5e1;
            color: #1e293b;
        }
        body.light-mode .footer {
            border-top-color: #cbd5e1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            transition: background 0.3s, color 0.3s;
        }

        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .app-container {
            position: relative;
            z-index: 1;
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px 24px 40px;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 200;
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(12px);
            box-shadow: var(--shadow);
            transition: var(--transition);
            font-size: 1.3rem;
        }
        .theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px var(--primary);
        }

        .header {
            text-align: center;
            padding: 20px 20px 30px;
        }
        .uni-logo {
            max-width: 120px;
            height: auto;
            margin-bottom: 10px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            filter: drop-shadow(0 0 8px #ffffff55);
            animation: logoGlow 3s infinite alternate;
        }
        @keyframes logoGlow {
            0% { filter: drop-shadow(0 0 4px #a855f7); }
            100% { filter: drop-shadow(0 0 16px #6366f1); }
        }
        .header h1 {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c084fc, #818cf8, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 8px 0 4px;
        }
        .header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        .header .subtitle {
            color: var(--text2);
            font-size: 1.05rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 500;
            display: inline-block;
        }
        .subtitle::after {
            content: '|';
            animation: blink 1s infinite;
            color: var(--accent);
            margin-left: 2px;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .badge-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 14px;
        }
        .badge {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 50px;
            padding: 7px 16px;
            font-size: 0.85rem;
            color: var(--text2);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
        }
        .badge:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 12px var(--primary);
        }
        .badge span { color: var(--accent); font-weight: 700; font-size: 1rem; }

        .toolbar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
            position: sticky;
            top: 16px;
            z-index: 10;
            background: #06060ecc;
            backdrop-filter: blur(20px);
            padding: 14px 20px;
            border-radius: 60px;
            border: 1px solid var(--card-border);
            box-shadow: var(--shadow);
        }
        .search-wrap {
            flex: 1;
            min-width: 220px;
            max-width: 450px;
            position: relative;
        }
        .search-wrap input {
            width: 100%;
            padding: 12px 18px 12px 44px;
            border-radius: 50px;
            border: 2px solid #2a2a45;
            background: #0a0a1c;
            color: var(--text);
            font-size: 0.95rem;
            transition: var(--transition);
            outline: none;
        }
        .search-wrap input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px #a855f722;
        }
        .search-wrap .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            pointer-events: none;
        }
        .btn {
            padding: 11px 22px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 7px;
            white-space: nowrap;
            font-family: inherit;
        }
        .btn-primary {
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            color: #fff;
            box-shadow: 0 4px 20px #8b5cf644;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px #8b5cf666;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #3a3a5a;
            color: var(--text);
        }
        .btn-outline:hover {
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 18px #06b6d422;
        }
        .btn-outline:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }
        .btn-icon {
            width: 34px;
            height: 34px;
            padding: 0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            border: 2px solid #3a3a5a;
            background: transparent;
            color: var(--text2);
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-icon:hover {
            border-color: var(--primary);
            color: #fff;
            background: #1a1a35;
            box-shadow: 0 0 16px #a855f733;
        }
        .btn-icon.danger:hover {
            border-color: var(--danger);
            color: var(--danger);
            box-shadow: 0 0 16px #f43f5e33;
            background: #1a0a10;
        }

        .sections-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
        }
        @media (max-width: 500px) {
            .sections-grid { grid-template-columns: 1fr; }
        }

        .section-card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            backdrop-filter: blur(16px);
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.3s;
            box-shadow: var(--shadow);
        }
        .section-card:hover {
            border-color: #3a3a60;
            box-shadow: 0 20px 60px #00000066, var(--glow);
            transform: translateY(-3px);
        }
        .section-card.collapsed .section-body {
            max-height: 0;
            opacity: 0;
            padding-top: 0;
            padding-bottom: 0;
            overflow: hidden;
        }
        .section-card .section-body {
            max-height: 3000px;
            opacity: 1;
            transition: max-height 0.5s ease, opacity 0.35s ease;
            padding: 0 18px 18px;
        }
        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 18px;
            cursor: pointer;
            user-select: none;
        }
        .section-header:hover { background: #ffffff04; }
        .section-header .folder-icon { font-size: 2rem; }
        .section-header .section-info { flex: 1; }
        .section-header .section-name { font-weight: 700; font-size: 1.1rem; color: #fff; }
        .section-header .section-meta { font-size: 0.75rem; color: var(--text3); }
        .section-header .chevron {
            font-size: 1.3rem;
            transition: transform 0.35s ease;
            color: var(--text3);
        }
        .section-card.collapsed .chevron { transform: rotate(-90deg); }
        .section-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s; }
        .section-card:hover .section-actions { opacity: 1; }

        .subsection {
            margin: 6px 0 6px 8px;
            border-left: 2px solid #2a2a45;
            padding-left: 14px;
            border-radius: 0 8px 8px 0;
            transition: var(--transition);
        }
        .subsection:hover { border-left-color: var(--primary2); }
        .subsection-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            user-select: none;
        }
        .subsection-header:hover { background: #ffffff05; }
        .subsection-header .sub-folder-icon { font-size: 1.3rem; }
        .subsection-header .sub-name { font-weight: 600; font-size: 0.9rem; flex: 1; color: #d0d0e8; }
        .subsection-header .sub-meta { font-size: 0.7rem; color: var(--text3); }
        .subsection-header .sub-chevron {
            font-size: 1rem;
            color: var(--text3);
            transition: transform 0.3s ease;
        }
        .subsection.collapsed .sub-chevron { transform: rotate(-90deg); }
        .subsection.collapsed .resources-list { max-height: 0; opacity: 0; overflow: hidden; }
        .resources-list { max-height: 2000px; opacity: 1; transition: max-height 0.4s ease, opacity 0.3s ease; padding-left: 8px; }

        .resource-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            margin: 4px 0;
            border-radius: var(--radius-sm);
            background: #0a0a1c;
            border: 1px solid transparent;
            transition: var(--transition);
            flex-wrap: wrap;
        }
        .resource-item:hover { border-color: #3a3a55; background: #0f0f24; }
        .resource-icon { font-size: 1.6rem; }
        .resource-info { flex: 1; }
        .resource-name { font-weight: 600; font-size: 0.85rem; color: #e8e8f8; }
        .resource-date { font-size: 0.68rem; color: var(--text3); }
        .resource-actions { display: flex; gap: 3px; opacity: 0; transition: opacity 0.2s; }
        .resource-item:hover .resource-actions { opacity: 1; }
        .resource-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid #06b6d433;
        }
        .resource-link:hover { background: #06b6d411; }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: #000000bb;
            backdrop-filter: blur(6px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal {
            background: #15152a;
            border: 1px solid #2e2e50;
            border-radius: var(--radius);
            padding: 28px 24px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 20px 60px #00000088;
            animation: slideUp 0.3s ease;
            position: relative;
        }
        .modal h2 { font-size: 1.4rem; margin-bottom: 18px; color: #fff; }
        .modal .form-group { margin-bottom: 14px; }
        .modal label { display: block; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 5px; font-weight: 600; }
        .modal input,
        .modal select {
            width: 100%;
            padding: 11px 14px;
            border-radius: var(--radius-sm);
            border: 2px solid #2a2a45;
            background: #0a0a1c;
            color: #fff;
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
        }
        .modal .btn-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .modal .close-btn {
            position: absolute;
            top: 12px;
            right: 14px;
            background: none;
            border: none;
            color: var(--text3);
            font-size: 1.5rem;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 200; display: flex; flex-direction: column; gap: 10px; }
        .toast {
            background: #1a1a35;
            border: 1px solid #3a3a55;
            border-radius: 50px;
            padding: 12px 22px;
            color: #fff;
            font-weight: 600;
            font-size: 0.85rem;
            animation: slideInRight 0.35s ease, fadeOutRight 0.35s ease 2.5s forwards;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(12px);
        }
        .toast.success { border-color: var(--success); }
        .toast.error { border-color: var(--danger); }
        .toast .undo-btn {
            background: var(--accent);
            border: none;
            color: #fff;
            padding: 4px 14px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.75rem;
            transition: background 0.2s;
        }
        .toast .undo-btn:hover { background: #0ea5e9; }
        @keyframes slideInRight {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeOutRight {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(120%); opacity: 0; }
        }

        .footer {
            text-align: center;
            padding: 30px 20px;
            color: var(--text3);
            font-size: 0.85rem;
            border-top: 1px solid #1a1a30;
            margin-top: 40px;
        }
        .footer .dev-name { color: var(--accent); font-weight: 600; }
        .footer .dev-name a { color: inherit; text-decoration: none; }
        .footer .heart { color: #f43f5e; animation: pulse 1s infinite; display: inline-block; }
        @keyframes pulse { 0%,100%{ transform: scale(1); } 50%{ transform: scale(1.25); } }
        .footer .maintainer { color: var(--gold); display: block; margin-top: 6px; }

        .back-to-top {
            position: fixed; bottom: 30px; left: 30px; z-index: 200;
            background: var(--card); border: 1px solid var(--card-border); border-radius: 50%;
            width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; backdrop-filter: blur(12px); opacity: 0; transform: translateY(20px);
            transition: opacity 0.3s, transform 0.3s; font-size: 1.4rem;
        }
        .back-to-top.visible { opacity: 1; transform: translateY(0); }

        .live-clock {
            position: fixed; top: 20px; left: 20px; z-index: 200;
            background: var(--card); border: 1px solid var(--card-border); border-radius: 50px;
            padding: 6px 16px; font-size: 0.8rem; color: var(--text2); backdrop-filter: blur(12px);
        }

        .contributors-list { list-style: none; padding: 0; }
        .contributors-list li {
            display: flex; justify-content: space-between; padding: 12px 16px;
            background: #0a0a1c; border-radius: var(--radius-sm); margin-bottom: 8px;
            border: 1px solid #2a2a45;
        }
        .contributors-list .contributor-name { font-weight: 600; color: #e2e2f0; }
        .contributors-list .contributor-count { color: var(--accent); font-weight: 700; }
    </style>
</head>

    <div class="live-clock" id="liveClock"></div>

    <script>
        (function() {
            const STORAGE_KEY = 'study_resource_hub_data';
            let storageAvailable = true;

            function testStorage() {
                try { localStorage.setItem('__test__','1'); localStorage.removeItem('__test__'); return true; } catch(e) { return false; }
            }

            function loadFromStorage() {
                if (!storageAvailable) return null;
                try { const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : null; } catch(e) { return null; }
            }

            function saveToStorage(data) {
                if (!storageAvailable) return showToast('⚠️ Storage not available.', 'error');
                try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) { showToast('⚠️ Could not save data.', 'error'); }
            }

            function getDefaultData() {
                return {
                    sections: [
                        {
                            id: generateId(), name: '📘 Computer Science',
                            subsections: [
                                { id: generateId(), name: 'Data Structures', resources: [
                                    { id: generateId(), name: 'DSA Handbook PDF', type: 'pdf', url: 'https://example.com/dsa-handbook.pdf', contributor: 'Anonymous', dateAdded: Date.now()-86400000*3 },
                                    { id: generateId(), name: 'Midterm Question Paper', type: 'question-paper', url: 'https://example.com/midterm-qp.pdf', contributor: 'Anonymous', dateAdded: Date.now()-86400000*7 }
                                ]},
                                { id: generateId(), name: 'Algorithms', resources: [
                                    { id: generateId(), name: 'Algorithm Notes', type: 'study-material', url: 'https://example.com/algo-notes.pdf', contributor: 'Anonymous', dateAdded: Date.now()-86400000*2 }
                                ]}
                            ]
                        },
                        {
                            id: generateId(), name: '📗 Mathematics',
                            subsections: [
                                { id: generateId(), name: 'Linear Algebra', resources: [
                                    { id: generateId(), name: 'Linear Algebra Textbook', type: 'pdf', url: 'https://example.com/linear-algebra.pdf', contributor: 'Anonymous', dateAdded: Date.now()-86400000*10 }
                                ]}
                            ]
                        }
                    ]
                };
            }

            function generateId() { return 'id_'+Date.now()+'_'+Math.random().toString(36).substr(2,9); }

            let appData = getDefaultData();
            storageAvailable = testStorage();
            if (storageAvailable) {
                const saved = loadFromStorage();
                if (saved && saved.sections) appData = saved;
                else saveToStorage(appData);
            }

            function refreshData() { if(storageAvailable) { const s=loadFromStorage(); if(s) appData=s; } }

            // ── Undo Stack ──
            let undoStack = [];
            function updateUndoButton() {
                const btn = document.getElementById('undoBtn');
                if (btn) btn.disabled = undoStack.length === 0;
            }
            function pushUndo(action) {
                undoStack.push(action);
                updateUndoButton();
            }
            window.undoLastDelete = function() {
                if (undoStack.length === 0) return;
                const action = undoStack.pop();
                if (action.type === 'section') {
                    appData.sections.splice(action.index, 0, action.data);
                } else if (action.type === 'subsection') {
                    const sec = appData.sections.find(s => s.id === action.sectionId);
                    if (sec) sec.subsections.splice(action.index, 0, action.data);
                } else if (action.type === 'resource') {
                    const sec = appData.sections.find(s => s.id === action.sectionId);
                    if (sec) {
                        const sub = sec.subsections.find(s => s.id === action.subId);
                        if (sub) sub.resources.splice(action.index, 0, action.data);
                    }
                }
                saveToStorage(appData);
                renderAll();
                updateUndoButton();
                showToast('↩️ Undo successful!');
                playClickSound();
            };

            // ── Audio for click sounds ──
            let audioCtx = null;
            function playClickSound() {
                try {
                    if (!audioCtx) {
                        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    }
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.frequency.value = 800;
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                    osc.start(audioCtx.currentTime);
                    osc.stop(audioCtx.currentTime + 0.1);
                } catch(e) { /* ignore */ }
            }
            document.addEventListener('click', function(e) {
                const el = e.target.closest('button, .btn-icon, .btn, .section-header, .subsection-header, .resource-link, .file-upload-zone, .back-to-top, .theme-toggle, .undo-btn');
                if (el) playClickSound();
            });

            // ── Particle background ──
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            function resizeCanvas() { canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
            class Particle {
                constructor() { this.reset(); }
                reset() {
                    this.x=Math.random()*canvas.width; this.y=Math.random()*canvas.height;
                    this.vx=(Math.random()-0.5)*0.5; this.vy=(Math.random()-0.5)*0.5;
                    this.radius=Math.random()*1.5+0.5; this.alpha=Math.random()*0.5+0.2;
                }
                update() {
                    this.x+=this.vx; this.y+=this.vy;
                    if(this.x<0||this.x>canvas.width) this.vx*=-1;
                    if(this.y<0||this.y>canvas.height) this.vy*=-1;
                }
                draw() {
                    ctx.beginPath(); ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
                    ctx.fillStyle=`rgba(139,92,246,${this.alpha})`; ctx.fill();
                }
            }
            function initParticles(count=80) { particles=[]; for(let i=0;i<count;i++) particles.push(new Particle()); }
            function drawLines() {
                for(let i=0;i<particles.length;i++) {
                    for(let j=i+1;j<particles.length;j++) {
                        const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y;
                        const dist=Math.sqrt(dx*dx+dy*dy);
                        if(dist<120) {
                            ctx.beginPath(); ctx.moveTo(particles[i].x,particles[i].y); ctx.lineTo(particles[j].x,particles[j].y);
                            ctx.strokeStyle=`rgba(99,102,241,${0.08*(1-dist/120)})`; ctx.lineWidth=0.5; ctx.stroke();
                        }
                    }
                }
            }
            function animateParticles() {
                if(document.hidden) { requestAnimationFrame(animateParticles); return; }
                ctx.clearRect(0,0,canvas.width,canvas.height);
                particles.forEach(p=>{ p.update(); p.draw(); });
                drawLines();
                requestAnimationFrame(animateParticles);
            }
            initParticles(); animateParticles();

            // ── Theme ──
            const themeToggle = document.getElementById('themeToggle');
            function applyTheme(t) {
                if(t==='light') { document.body.classList.add('light-mode'); themeToggle.textContent='☀️'; }
                else { document.body.classList.remove('light-mode'); themeToggle.textContent='🌓'; }
                localStorage.setItem('theme',t);
            }
            applyTheme(localStorage.getItem('theme')||'dark');
            themeToggle.addEventListener('click', ()=> applyTheme(document.body.classList.contains('light-mode')?'dark':'light'));

            // ── Clock & Back to top ──
            function updateClock() { document.getElementById('liveClock').textContent='🕒 '+new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
            updateClock(); setInterval(updateClock,1000);
            const backBtn=document.getElementById('backToTop');
            window.addEventListener('scroll', ()=> backBtn.classList.toggle('visible', window.scrollY>400));
            backBtn.addEventListener('click', ()=> window.scrollTo({top:0,behavior:'smooth'}));

            function showToast(msg,type='success') {
                const container=document.getElementById('toastContainer');
                const t=document.createElement('div'); t.className=`toast ${type}`; t.textContent=msg;
                container.appendChild(t); setTimeout(()=> t.remove(), 3000);
            }

            function showDeletionToast(msg, undoCallback) {
                const container=document.getElementById('toastContainer');
                const t=document.createElement('div'); t.className='toast success';
                t.innerHTML = `${msg} <button class="undo-btn">Undo</button>`;
                const undoBtn = t.querySelector('.undo-btn');
                let timeout = setTimeout(()=> t.remove(), 3000);
                undoBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    clearTimeout(timeout);
                    t.remove();
                    undoCallback();
                });
                container.appendChild(t);
            }

            function escapeHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

            // ── Stats ──
            function updateStats() {
                let subs=0,res=0;
                appData.sections.forEach(s=>{ subs+=s.subsections.length; s.subsections.forEach(b=> res+=b.resources.length); });
                document.getElementById('statSections').textContent=appData.sections.length;
                document.getElementById('statSubsections').textContent=subs;
                document.getElementById('statResources').textContent=res;
            }

            function renderAll() {
                refreshData();
                updateUndoButton();
                const q=document.getElementById('searchInput').value.toLowerCase().trim();
                const grid=document.getElementById('sectionsGrid'), empty=document.getElementById('emptyState');
                let filtered=appData.sections;
                if(q) {
                    filtered=appData.sections.map(sec=>{
                        const secMatch=sec.name.toLowerCase().includes(q);
                        const fSubs=sec.subsections.map(sub=>{
                            const subMatch=sub.name.toLowerCase().includes(q);
                            const fRes=sub.resources.filter(r=> r.name.toLowerCase().includes(q)||r.type.toLowerCase().includes(q));
                            if(subMatch||fRes.length) return {...sub, resources: subMatch?sub.resources:fRes};
                            return null;
                        }).filter(Boolean);
                        if(secMatch||fSubs.length) return {...sec, subsections: secMatch?sec.subsections:fSubs};
                        return null;
                    }).filter(Boolean);
                }
                if(!filtered.length) {
                    grid.innerHTML=''; empty.style.display='block';
                    empty.innerHTML=q?`<span class="empty-icon">🔍</span><p>No results for "<strong>${escapeHtml(q)}</strong>"</p>`:
                        '<span class="empty-icon">📭</span><p>No sections yet!</p><p style="font-size:0.9rem;">Click <strong>"➕ New Section"</strong> to get started.</p>';
                } else {
                    empty.style.display='none';
                    grid.innerHTML=filtered.map(sec=>{
                        const collapsed=sec._collapsed&&!q?'collapsed':'';
                        return `<div class="section-card ${collapsed}" data-section-id="${sec.id}">
                            <div class="section-header" onclick="toggleSection('${sec.id}')">
                                <span class="folder-icon">📁</span>
                                <div class="section-info">
                                    <div class="section-name">${escapeHtml(sec.name)}</div>
                                    <div class="section-meta">${sec.subsections.length} subsections · ${sec.subsections.reduce((a,s)=>a+s.resources.length,0)} resources</div>
                                </div>
                                <span class="chevron">▼</span>
                                <div class="section-actions" onclick="event.stopPropagation()">
                                    <button class="btn-icon" onclick="openAddSubsectionModal('${sec.id}')">➕</button>
                                    <button class="btn-icon" onclick="openEditSectionModal('${sec.id}')">✏️</button>
                                    <button class="btn-icon danger" onclick="confirmDeleteSection('${sec.id}')">🗑️</button>
                                </div>
                            </div>
                            <div class="section-body">
                                ${sec.subsections.length===0?'<p style="color:#6b6b8a;font-size:0.8rem;padding:8px 0;">No subsections yet.</p>':''}
                                ${sec.subsections.map(sub=> renderSubsection(sec.id,sub)).join('')}
                            </div>
                        </div>`;
                    }).join('');
                }
                updateStats();
            }

            function renderSubsection(sectionId, sub) {
                const collapsed=sub._collapsed?'collapsed':'';
                return `<div class="subsection ${collapsed}" data-sub-id="${sub.id}">
                    <div class="subsection-header" onclick="toggleSubsection('${sectionId}','${sub.id}')">
                        <span class="sub-folder-icon">📂</span>
                        <span class="sub-name">${escapeHtml(sub.name)}</span>
                        <span class="sub-meta">${sub.resources.length} items</span>
                        <span class="sub-chevron">▼</span>
                        <div class="section-actions" style="opacity:1;" onclick="event.stopPropagation()">
                            <button class="btn-icon" style="width:28px;height:28px;font-size:0.8rem;" onclick="openAddResourceModal('${sectionId}','${sub.id}')">➕</button>
                            <button class="btn-icon" style="width:28px;height:28px;font-size:0.8rem;" onclick="openEditSubsectionModal('${sectionId}','${sub.id}')">✏️</button>
                            <button class="btn-icon danger" style="width:28px;height:28px;font-size:0.8rem;" onclick="confirmDeleteSubsection('${sectionId}','${sub.id}')">🗑️</button>
                        </div>
                    </div>
                    <div class="resources-list">
                        ${sub.resources.length===0?'<p style="color:#6b6b8a;font-size:0.75rem;">No resources yet.</p>':''}
                        ${sub.resources.map(r=>{
                            const icon={'pdf':'📕','question-paper':'📝','study-material':'📓'}[r.type]||'📎';
                            return `<div class="resource-item">
                                <span class="resource-icon">${icon}</span>
                                <div class="resource-info">
                                    <div class="resource-name">${escapeHtml(r.name)}</div>
                                    <div class="resource-date">${new Date(r.dateAdded).toLocaleDateString()} · ${escapeHtml(r.type)}</div>
                                </div>
                                ${r.url?`<a href="${escapeHtml(r.url)}" target="_blank" class="resource-link" onclick="event.stopPropagation()">🔗 Open</a>`:'<span style="font-size:0.7rem;color:#6b6b8a;">No link</span>'}
                                <div class="resource-actions">
                                    <button class="btn-icon" style="width:26px;height:26px;font-size:0.7rem;" onclick="event.stopPropagation();openEditResourceModal('${sectionId}','${sub.id}','${r.id}')">✏️</button>
                                    <button class="btn-icon danger" style="width:26px;height:26px;font-size:0.7rem;" onclick="event.stopPropagation();confirmDeleteResource('${sectionId}','${sub.id}','${r.id}')">🗑️</button>
                                </div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
            }

            window.toggleSection = function(id) {
                const sec=appData.sections.find(s=>s.id===id); if(!sec) return;
                sec._collapsed=!sec._collapsed; saveToStorage(appData);
                document.querySelector(`.section-card[data-section-id="${id}"]`)?.classList.toggle('collapsed',sec._collapsed);
            };
            window.toggleSubsection = function(sid,subid) {
                const sec=appData.sections.find(s=>s.id===sid); if(!sec) return;
                const sub=sec.subsections.find(s=>s.id===subid); if(!sub) return;
                sub._collapsed=!sub._collapsed; saveToStorage(appData);
                document.querySelector(`.subsection[data-sub-id="${subid}"]`)?.classList.toggle('collapsed',sub._collapsed);
            };

            // ── CRUD with undo ──
            function addSection(name) { appData.sections.push({id:generateId(),name,subsections:[]}); saveToStorage(appData); renderAll(); showToast('✅ Section added!'); }
            function updateSection(id,name) { const s=appData.sections.find(x=>x.id===id); if(s){s.name=name; saveToStorage(appData); renderAll(); showToast('✏️ Updated!');} }
            function deleteSection(sectionId) {
                const idx = appData.sections.findIndex(s => s.id === sectionId);
                if (idx === -1) return;
                const deleted = appData.sections.splice(idx, 1)[0];
                pushUndo({ type: 'section', data: deleted, index: idx });
                saveToStorage(appData);
                renderAll();
                showDeletionToast('🗑️ Section deleted.', () => window.undoLastDelete());
            }
            function addSubsection(sid,name) { const s=appData.sections.find(x=>x.id===sid); if(s){s.subsections.push({id:generateId(),name,resources:[]}); saveToStorage(appData); renderAll(); showToast('📂 Subsection added!');} }
            function updateSubsection(sid,subid,name) { const s=appData.sections.find(x=>x.id===sid); if(s){const b=s.subsections.find(x=>x.id===subid); if(b){b.name=name; saveToStorage(appData); renderAll(); showToast('✏️ Updated!');}} }
            function deleteSubsection(sectionId, subId) {
                const sec = appData.sections.find(s => s.id === sectionId);
                if (!sec) return;
                const idx = sec.subsections.findIndex(s => s.id === subId);
                if (idx === -1) return;
                const deleted = sec.subsections.splice(idx, 1)[0];
                pushUndo({ type: 'subsection', data: deleted, sectionId, index: idx });
                saveToStorage(appData);
                renderAll();
                showDeletionToast('🗑️ Subsection deleted.', () => window.undoLastDelete());
            }
            function addResource(sid,subid,res) { const s=appData.sections.find(x=>x.id===sid); if(s){const b=s.subsections.find(x=>x.id===subid); if(b){b.resources.push({id:generateId(), ...res, dateAdded:Date.now()}); saveToStorage(appData); renderAll(); showToast('📄 Resource added!');}} }
            function updateResource(sid,subid,rid,upd) { const s=appData.sections.find(x=>x.id===sid); if(s){const b=s.subsections.find(x=>x.id===subid); if(b){const r=b.resources.find(x=>x.id===rid); if(r){Object.assign(r,upd); saveToStorage(appData); renderAll(); showToast('✏️ Updated!');}}} }
            function deleteResource(sectionId, subId, resId) {
                const sec = appData.sections.find(s => s.id === sectionId);
                if (!sec) return;
                const sub = sec.subsections.find(s => s.id === subId);
                if (!sub) return;
                const idx = sub.resources.findIndex(r => r.id === resId);
                if (idx === -1) return;
                const deleted = sub.resources.splice(idx, 1)[0];
                pushUndo({ type: 'resource', data: deleted, sectionId, subId, index: idx });
                saveToStorage(appData);
                renderAll();
                showDeletionToast('🗑️ Resource deleted.', () => window.undoLastDelete());
            }

            window.deleteSection = deleteSection;
            window.deleteSubsection = deleteSubsection;
            window.deleteResource = deleteResource;

            function openModal(html) { document.getElementById('modalContent').innerHTML=html; document.getElementById('modalOverlay').style.display='flex'; }
            window.closeModal = function() { document.getElementById('modalOverlay').style.display='none'; };
            window.closeModalOutside = function(e) { if(e.target===document.getElementById('modalOverlay')) closeModal(); };

            // ── Section modals ──
            window.openAddSectionModal=()=>{ openModal(`<h2>📁 New Section</h2><div class="form-group"><label>Name</label><input id="modalSectionName" placeholder="e.g., Physics"></div><div class="btn-row"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="submitAddSection()">Create</button></div>`); setTimeout(()=>document.getElementById('modalSectionName')?.focus(),100); };
            window.submitAddSection=()=>{ const n=document.getElementById('modalSectionName').value.trim(); if(!n) return showToast('Enter a name','error'); addSection(n); closeModal(); };
            window.openEditSectionModal=(id)=>{ const s=appData.sections.find(x=>x.id===id); if(!s) return; openModal(`<h2>✏️ Edit Section</h2><div class="form-group"><label>Name</label><input id="modalSectionName" value="${escapeHtml(s.name)}"></div><div class="btn-row"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="submitEditSection('${id}')">Save</button></div>`); setTimeout(()=>document.getElementById('modalSectionName')?.focus(),100); };
            window.submitEditSection=(id)=>{ const n=document.getElementById('modalSectionName').value.trim(); if(!n) return showToast('Enter a name','error'); updateSection(id,n); closeModal(); };
            window.confirmDeleteSection=(id)=>{ const s=appData.sections.find(x=>x.id===id); if(!s) return; openModal(`<h2>⚠️ Delete Section?</h2><p>Delete "${escapeHtml(s.name)}"? This removes everything inside.</p><div class="btn-row"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-primary" style="background:#f43f5e;" onclick="deleteSection('${id}');closeModal();">Delete</button></div>`); };

            window.openAddSubsectionModal=(sid)=>{ openModal(`<h2>📂 New Subsection</h2><div class="form-group"><label>Name</label><input id="modalSubName" placeholder="e.g., Chapter 1"></div><div class="btn-row"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="submitAddSubsection('${sid}')">Add</button></div>`); setTimeout(()=>document.getElementById('modalSubName')?.focus(),100); };
            window.submitAddSubsection=(sid)=>{ const n=document.getElementById('modalSubName').value.trim(); if(!n) return showToast('Enter a name','error'); addSubsection(sid,n); closeModal(); };
            window.openEditSubsectionModal=(sid,subid)=>{ const s=appData.sections.find(x=>x.id===sid); if(!s) return; const b=s.subsections.find(x=>x.id===subid); if(!b) return; openModal(`<h2>✏️ Edit Subsection</h2><div class="form-group"><label>Name</label><input id="modalSubName" value="${escapeHtml(b.name)}"></div><div class="btn-row"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="submitEditSubsection('${sid}','${subid}')">Save</button></div>`); setTimeout(()=>document.getElementById('modalSubName')?.focus(),100); };
            window.submitEditSubsection=(sid,subid)=>{ const n=document.getElementById('modalSubName').value.trim(); if(!n) return showToast('Enter a name','error'); updateSubsection(sid,subid,n); closeModal(); };
            window.confirmDeleteSubsection=(sid,subid)=>{ const s=appData.sections.find(x=>x.id===sid); if(!s) return; const b=s.subsections.find(x=>x.id===subid); if(!b) return; openModal(`<h2>⚠️ Delete Subsection?</h2><p>Delete "${escapeHtml(b.name)}"? (${b.resources.length} resources)</p><div class="btn-row"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-primary" style="background:#f43f5e;" onclick="deleteSubsection('${sid}','${subid}');closeModal();">Delete</button></div>`); };

            // ── Resource modals (with contributor) ──
            window._pendingFileData=null;
            window.openAddResourceModal=(sid,subid)=>{
                window._pendingFileData=null;
                openModal(`<h2>📄 Add Resource</h2>
                    <div class="form-group"><label>Name</label><input id="modalResName" placeholder="e.g., Textbook Chapter 5"></div>
                    <div class="form-group"><label>Type</label><select id="modalResType"><option value="pdf">📕 PDF / Book</option><option value="question-paper">📝 Question Paper</option><option value="study-material">📓 Study Material</option><option value="other">📎 Other</option></select></div>
                    <div class="form-group"><label>Contributor Name</label><input id="modalContributor" placeholder="Your name (optional)"></div>
                    <div class="form-group"><label>URL (optional)</label><input type="url" id="modalResUrl" placeholder="https://..."></div>
                    <div class="form-group"><label>Or upload a file</label><div class="file-upload-zone" onclick="document.getElementById('modalFileInput').click()">📤 Click to browse<input type="file" id="modalFileInput" accept=".pdf,.doc,.docx,.ppt,.pptx,.txt,.jpg,.jpeg,.png" onchange="handleFileSelect(this)"></div><div class="file-name-display" id="fileDisplayName"></div><p class="note">Max ~5MB. Use links for larger files.</p></div>
                    <div class="btn-row"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="submitAddResource('${sid}','${subid}')">Add Resource</button></div>`);
                setTimeout(()=>document.getElementById('modalResName')?.focus(),100);
            };
            window.handleFileSelect=(input)=>{
                const f=input.files[0]; if(!f) return;
                if(f.size>5*1024*1024){ showToast('⚠️ File too large (max 5MB)','error'); input.value=''; return; }
                const reader=new FileReader();
                reader.onload=function(e){
                    window._pendingFileData=e.target.result;
                    document.getElementById('fileDisplayName').textContent='📎 '+f.name+' ('+(f.size/1024).toFixed(1)+' KB)';
                    if(!document.getElementById('modalResName').value.trim()) document.getElementById('modalResName').value=f.name.replace(/\.[^/.]+$/,'');
                };
                reader.readAsDataURL(f);
            };
            window.submitAddResource=(sid,subid)=>{
                const name=document.getElementById('modalResName').value.trim();
                const type=document.getElementById('modalResType').value;
                const contributor=document.getElementById('modalContributor').value.trim()||'Anonymous';
                let url=document.getElementById('modalResUrl').value.trim();
                let isFile=false;
                if(!name) return showToast('Enter a name','error');
                if(window._pendingFileData){ url=window._pendingFileData; isFile=true; }
                if(!url) return showToast('Provide a URL or upload a file','error');
                addResource(sid,subid,{name,type,url,isFile,contributor});
                closeModal();
            };

            window.openEditResourceModal=(sid,subid,rid)=>{
                const sec=appData.sections.find(x=>x.id===sid); if(!sec) return;
                const sub=sec.subsections.find(x=>x.id===subid); if(!sub) return;
                const res=sub.resources.find(x=>x.id===rid); if(!res) return;
                openModal(`<h2>✏️ Edit Resource</h2>
                    <div class="form-group"><label>Name</label><input id="modalResName" value="${escapeHtml(res.name)}"></div>
                    <div class="form-group"><label>Type</label><select id="modalResType">
                        <option value="pdf" ${res.type==='pdf'?'selected':''}>📕 PDF</option>
                        <option value="question-paper" ${res.type==='question-paper'?'selected':''}>📝 Question Paper</option>
                        <option value="study-material" ${res.type==='study-material'?'selected':''}>📓 Study Material</option>
                        <option value="other" ${res.type==='other'?'selected':''}>📎 Other</option>
                    </select></div>
                    <div class="form-group"><label>Contributor</label><input id="modalContributor" value="${escapeHtml(res.contributor||'Anonymous')}"></div>
                    <div class="form-group"><label>URL</label><input type="url" id="modalResUrl" value="${escapeHtml(res.isFile?'':res.url)}"></div>
                    <div class="btn-row"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="submitEditResource('${sid}','${subid}','${rid}')">Save</button></div>`);
                setTimeout(()=>document.getElementById('modalResName')?.focus(),100);
            };
            window.submitEditResource=(sid,subid,rid)=>{
                const name=document.getElementById('modalResName').value.trim();
                const type=document.getElementById('modalResType').value;
                const contributor=document.getElementById('modalContributor').value.trim()||'Anonymous';
                const newUrl=document.getElementById('modalResUrl').value.trim();
                if(!name) return showToast('Enter a name','error');
                const sec=appData.sections.find(x=>x.id===sid); if(!sec) return;
                const sub=sec.subsections.find(x=>x.id===subid); if(!sub) return;
                const res=sub.resources.find(x=>x.id===rid); if(!res) return;
                const upd={name,type,contributor};
                if(newUrl){ upd.url=newUrl; upd.isFile=false; } else if(!res.isFile){ upd.url=''; }
                updateResource(sid,subid,rid,upd);
                closeModal();
            };
            window.confirmDeleteResource=(sid,subid,rid)=>{
                const sec=appData.sections.find(x=>x.id===sid); if(!sec) return;
                const sub=sec.subsections.find(x=>x.id===subid); if(!sub) return;
                const res=sub.resources.find(x=>x.id===rid); if(!res) return;
                openModal(`<h2>⚠️ Delete Resource?</h2><p>Delete "${escapeHtml(res.name)}"?</p><div class="btn-row"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-primary" style="background:#f43f5e;" onclick="deleteResource('${sid}','${subid}','${rid}');closeModal();">Delete</button></div>`);
            };

            // ── Contributors Modal ──
            window.openContributorsModal = function() {
                const contributorMap = {};
                appData.sections.forEach(sec => {
                    sec.subsections.forEach(sub => {
                        sub.resources.forEach(res => {
                            const name = res.contributor || 'Anonymous';
                            contributorMap[name] = (contributorMap[name] || 0) + 1;
                        });
                    });
                });
                const sorted = Object.entries(contributorMap).sort((a,b) => b[1] - a[1]);
                let listHtml = '';
                if (sorted.length === 0) {
                    listHtml = '<p style="text-align:center;color:var(--text3);">No contributions yet. Add a resource with a contributor name!</p>';
                } else {
                    listHtml = '<ul class="contributors-list">' + sorted.map(([name, count]) =>
                        `<li><span class="contributor-name">${escapeHtml(name)}</span> <span class="contributor-count">${count} resource${count>1?'s':''}</span></li>`
                    ).join('') + '</ul>';
                }
                openModal(`<h2>👥 Contributors</h2>${listHtml}<div class="btn-row"><button class="btn btn-outline" onclick="closeModal()">Close</button></div>`);
            };

            window.exportData=()=>{
                const blob=new Blob([JSON.stringify(appData,null,2)],{type:'application/json'});
                const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='study-hub-backup.json'; a.click(); showToast('📥 Exported!');
            };
            window.importDataPrompt=()=>{
                const input=document.createElement('input'); input.type='file'; input.accept='.json';
                input.onchange=e=>{
                    const file=e.target.files[0]; if(!file) return;
                    const reader=new FileReader();
                    reader.onload=ev=>{
                        try{
                            const imported=JSON.parse(ev.target.result);
                            if(!imported.sections) throw new Error('Invalid');
                            if(confirm(`Import ${imported.sections.length} sections?`)){ appData=imported; saveToStorage(appData); renderAll(); showToast('📤 Imported!'); }
                        }catch{ showToast('❌ Invalid file','error'); }
                    };
                    reader.readAsText(file);
                };
                input.click();
            };

            document.addEventListener('keydown',e=>{ if(e.ctrlKey&&e.key==='k'){ e.preventDefault(); document.getElementById('searchInput').focus(); } });

            renderAll();

            // Typing animation
            const subtitleEl=document.getElementById('subtitleText');
            const phrases=["LEARN TOGETHER ! GROW TOGETHER !","COEP TECH COMMUNITY HUB","UPLOAD · SHARE · EXCEL"];
            let pIdx=0, cIdx=0, del=false;
            function typeLoop(){
                const cur=phrases[pIdx];
                if(!del){
                    subtitleEl.textContent=cur.substring(0,cIdx+1); cIdx++;
                    if(cIdx===cur.length){ del=true; setTimeout(typeLoop,2000); return; }
                }else{
                    subtitleEl.textContent=cur.substring(0,cIdx-1); cIdx--;
                    if(cIdx===0){ del=false; pIdx=(pIdx+1)%phrases.length; }
                }
                setTimeout(typeLoop, del?60:100);
            }
            typeLoop();
        })();
    </script>
</body>
</html>
